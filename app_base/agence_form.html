{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Ajouter une nouvelle agence</h2>
    <hr>

    <form method="post">
        {% csrf_token %}
        
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Enregistrer</button>
        <a href="{% url 'agences' %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
