{% extends "base.html" %}
{% load static %}
{% block content %}
  <div class="content-wrapper">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-8 col-lg-6 mx-auto">
          <div class="glass-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="mb-0"><i class="mdi mdi-domain"></i> Nouvelle Agence</h5>
              <a href="{% url 'agences' %}" class="btn btn-outline-light btn-sm"><i class="mdi mdi-arrow-left"></i> Retour</a>
            </div>

            <form class="forms-sample" method="POST">
              {% csrf_token %}

              <div class="form-group mb-3">
                <label for="nom"><i class="mdi mdi-signature-freehand"></i> Nom</label>
                <input type="text" class="form-control" id="nom" placeholder="Ex: Agence Centre-Ville" name="nom" required>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="numero_impot"><i class="mdi mdi-file-document"></i> N° Impôt</label>
                    <input type="text" class="form-control" id="numero_impot" placeholder="Ex: A123456" name="numero_impot" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="numero_fisc"><i class="mdi mdi-file-document-outline"></i> N° Fiscal</label>
                    <input type="text" class="form-control" id="numero_fisc" placeholder="Ex: F123456" name="numero_fisc" required>
                  </div>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="effectif"><i class="mdi mdi-account-multiple"></i> Effectif</label>
                    <input type="number" class="form-control" id="effectif" placeholder="Ex: 15" name="effectif" required>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="revenu"><i class="mdi mdi-cash"></i> Revenu</label>
                    <input type="number" step="0.01" class="form-control" id="revenu" placeholder="Ex: 45000000" name="revenu" required>
                  </div>
                </div>
              </div>

              <div class="form-group mb-3">
                <label for="email"><i class="mdi mdi-email"></i> Email</label>
                <div class="input-group">
                  <span class="input-group-text bg-dark text-white border-0">@</span>
                  <input type="email" class="form-control" id="email" placeholder="Ex: contact@agence.cd" name="email" required>
                </div>
              </div>

              <div class="form-check mb-4">
                <label class="form-check-label">
                  <input type="checkbox" class="form-check-input" name="active" checked>
                  <i class="mdi mdi-check-circle"></i> Agence active
                </label>
              </div>

              <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'agences' %}" class="btn btn-outline-light me-2"><i class="mdi mdi-close"></i> Annuler</a>
                <button type="submit" class="btn btn-success"><i class="mdi mdi-check"></i> Ajouter</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
