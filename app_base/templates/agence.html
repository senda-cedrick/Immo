{% extends "base.html" %}
{% load static %}
{% block content %}
<div class="content-wrapper bg-secondary">

  <!-- Header -->
  <div class="page-header bg-secondary">
    <h3 class="page-title text-dark bg-secondary">Nouvelle Agence</h3>

    <form class="forms-sample" method="POST">
  {% csrf_token %}
  
  <div class="form-group">
    <label for="nom">Noms</label>
    <input type="text" class="form-control bg-secondary text-dark" id="nom" placeholder="Entrez le nom" name="nom" required>
  </div>

  <div class="form-group">
    <label for="numero_impot">Numero_impot</label>
    <input type="text" class="form-control bg-secondary text-dark" id="numero_impot" placeholder="Entrez le numero_impot" name="numero_impot" required>
  </div>

  <div class="form-group">
    <label for="numero_fisc">Numero_fiscal</label>
    <input type="text" class="form-control bg-secondary text-dark" id="numero_fisc" placeholder="Entrez le numero_fiscal" name="numero_fisc" required>
  </div>

  <div class="form-group">
    <label for="effectif">Effectif</label>
    <input type="number" class="form-control bg-secondary text-dark" id="effectif" placeholder="Entrez l'effectif" name="effectif" required>
  </div>

  <div class="form-group">
    <label for="revenu">Revenu</label>
    <input type="number" step="0.01" class="form-control bg-secondary text-dark" id="revenu" placeholder="Entrez le revenu" name="revenu" required>
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <div class="input-group">
      <div class="input-group-prepend">
        <span class="input-group-text">@</span>
      </div>
      <input type="email" class="form-control bg-secondary text-dark" id="email" placeholder="Entrez l'email" name="email" required>
    </div>
  </div>

  <div class="form-check form-check-flat form-check-primary">
    <label class="form-check-label">
      <input type="checkbox" class="form-check-input bg-secondary text-dark"> Remember me
      <i class="input-helper"></i>
    </label>
  </div>

  <button type="submit" class="btn btn-success mr-2 btn-round">Ajouter</button>
  <a href="{% url 'agences' %}" class="btn btn-danger btn-round">Annuler</a>
</form>
{% endblock content %}
