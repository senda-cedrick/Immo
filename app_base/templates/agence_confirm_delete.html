{% extends "base.html" %}
{% block content %}
  <div class="content-wrapper">
    <div class="container-fluid">
      <div class="glass-card">
        <h5 class="mb-4">Supprimer l'agence</h5>
        <p>Êtes-vous sûr de vouloir supprimer l'agence <strong>{{ object.nom }}</strong> ?</p>
        <form method="post">
          {% csrf_token %}
          <a href="{% url 'agences' %}" class="btn btn-outline-light btn-sm me-2"><i class="mdi mdi-close"></i> Annuler</a>
          <button type="submit" class="btn btn-danger"><i class="mdi mdi-delete"></i> Supprimer</button>
        </form>
      </div>
    </div>
  </div>
{% endblock content %}
