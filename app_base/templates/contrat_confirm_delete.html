{% extends "base.html" %}
{% load static %}

{% block content %}
  <div class="content-wrapper">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-6 col-lg-4 mx-auto">
          <div class="glass-card">
            <h5 class="mb-4 text-center">Confirmer la suppression</h5>
            <p class="text-center">Voulez-vous vraiment supprimer le contrat <strong>{{ contrat.reference }}</strong> ?</p>

            <form method="post" class="d-flex justify-content-center gap-3">
              {% csrf_token %}
              <a href="{% url 'contrats' %}" class="btn btn-outline-secondary">Annuler</a>
              <button type="submit" class="btn btn-danger">Supprimer</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
