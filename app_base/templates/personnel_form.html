{% extends "base.html" %}
{% load static %}
{% block content %}
  <div class="content-wrapper">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-8 col-lg-6 mx-auto">
          <div class="glass-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="mb-0">
                <i class="mdi mdi-account-group"></i>
                {% if object %}Modifier le personnel{% else %}Nouveau Personnel{% endif %}
              </h5>
              <a href="{% url 'personnels' %}" class="btn btn-outline-light btn-sm"><i class="mdi mdi-arrow-left"></i> Retour</a>
            </div>

            <form method="post" class="forms-sample">
              {% csrf_token %}

              <div class="form-group mb-3">
                <label for="id_noms" class="text-dark fw-semibold"><i class="mdi mdi-account"></i> Noms</label>
                {{ form.noms }}
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="id_sexe" class="text-dark fw-semibold"><i class="mdi mdi-gender-male-female"></i> Sexe</label>
                    {{ form.sexe }}
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="id_role" class="text-dark fw-semibold"><i class="mdi mdi-briefcase"></i> Rôle</label>
                    {{ form.role }}
                  </div>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="id_status" class="text-dark fw-semibold"><i class="mdi mdi-information"></i> Statut</label>
                    {{ form.status }}
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label for="id_agence" class="text-dark fw-semibold"><i class="mdi mdi-domain"></i> Agence</label>
                    {{ form.agence }}
                  </div>
                </div>
              </div>

              <div class="form-group mb-3">
                <label for="id_email" class="text-dark fw-semibold"><i class="mdi mdi-email"></i> Email</label>
                <div class="input-group">
                  <span class="input-group-text bg-dark text-white border-0">@</span>
                  {{ form.email }}
                </div>
              </div>

              <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'personnels' %}" class="btn btn-outline-light me-2"><i class="mdi mdi-close"></i> Annuler</a>
                <button type="submit" class="btn btn-success"><i class="mdi mdi-check"></i> {% if object %}Modifier{% else %}Ajouter{% endif %}</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
