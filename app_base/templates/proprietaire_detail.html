{% extends "base.html" %}
{% load static %}

{% block content %}
  <div class="content-wrapper">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-10 col-lg-8 mx-auto">
          <div class="glass-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="mb-0">
                <i class="mdi mdi-account-star"></i>
                Détail du propriétaire
              </h5>
              <div>
                <a href="{% url 'modifier_proprietaire' proprietaire.id %}" class="btn btn-outline-warning btn-sm me-2"><i class="mdi mdi-pencil"></i> Modifier</a>
                <a href="{% url 'proprietaires' %}" class="btn btn-outline-light btn-sm"><i class="mdi mdi-arrow-left"></i> Retour</a>
              </div>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="text-muted fw-semibold"><i class="mdi mdi-account-outline"></i> Nom complet</label>
                  <div class="fw-bold text-dark">{{ proprietaire.user.noms }}</div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="text-muted fw-semibold"><i class="mdi mdi-phone"></i> Téléphone</label>
                  <div class="fw-bold text-dark">{{ proprietaire.telephone }}</div>
                </div>
              </div>
              <div class="col-12">
                <div class="mb-3">
                  <label class="text-muted fw-semibold"><i class="mdi mdi-map-marker"></i> Adresse</label>
                  <div class="fw-bold text-dark">{{ proprietaire.adresse }}</div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="text-muted fw-semibold"><i class="mdi mdi-domain"></i> Agence</label>
                  <div class="fw-bold text-dark">{{ proprietaire.agence.nom }}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
