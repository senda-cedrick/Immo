{% extends "base.html" %}
{% load static %}
{% block content %}
  <div class="content-wrapper">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-6 col-lg-4 mx-auto">
          <div class="glass-card">
            <h5 class="mb-4">Supprimer la propriété</h5>
            <p>Êtes-vous sûr de vouloir supprimer <strong>{{ object.agent }}</strong> ?</p>
            <form method="post">
              {% csrf_token %}
              <a href="{% url 'proprietes' %}" class="btn btn-outline-light btn-sm me-2"><i class="mdi mdi-close"></i> Annuler</a>
              <button type="submit" class="btn btn-danger"><i class="mdi mdi-delete"></i> Supprimer</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
