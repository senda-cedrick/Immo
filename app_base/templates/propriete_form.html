{% extends "base.html" %}
{% load static %}
{% block content %}
  <div class="content-wrapper">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-8 col-lg-6 mx-auto">
          <div class="glass-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="mb-0">
                <i class="mdi mdi-home"></i>
                {% if object %}Modifier la propriété{% else %}Nouvelle propriété{% endif %}
              </h5>
              <a href="{% url 'proprietes' %}" class="btn btn-outline-light btn-sm"><i class="mdi mdi-arrow-left"></i> Retour</a>
            </div>

            <form method="post" class="forms-sample">
              {% csrf_token %}

              <div class="form-group mb-3">
                <label class="text-dark fw-semibold" for="id_type_propriete"><i class="mdi mdi-home-group"></i> Type de propriété</label>
                {{ form.type_propriete }}
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <div class="form-group">
                    <label class="text-dark fw-semibold" for="id_ville"><i class="mdi mdi-map-marker"></i> Ville</label>
                    {{ form.ville }}
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <label class="text-dark fw-semibold" for="id_agent"><i class="mdi mdi-account"></i> Agent</label>
                    {{ form.agent }}
                  </div>
                </div>
              </div>

              <div class="form-group mb-3">
                <label class="text-dark fw-semibold" for="id_appartement"><i class="mdi mdi-home-floor-3"></i> Appartement</label>
                {{ form.appartement }}
              </div>

              <div class="form-check mb-4">
                <label class="form-check-label text-dark fw-semibold">
                  {{ form.gestion }}
                  <i class="mdi mdi-check-circle"></i> Gestion active
                </label>
              </div>

              <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'proprietes' %}" class="btn btn-outline-light me-2"><i class="mdi mdi-close"></i> Annuler</a>
                <button type="submit" class="btn btn-success"><i class="mdi mdi-check"></i> {% if object %}Modifier{% else %}Ajouter{% endif %}</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
