{% extends "base.html" %}
{% load static %}
{% block content %}
  <div class="content-wrapper">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-8 col-lg-6 mx-auto">
          <div class="glass-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="mb-0">
                <i class="mdi mdi-home-group"></i>
                {% if object %}Modifier le type de propriété{% else %}Nouveau type de propriété{% endif %}
              </h5>
              <a href="{% url 'type_proprietes' %}" class="btn btn-outline-light btn-sm"><i class="mdi mdi-arrow-left"></i> Retour</a>
            </div>

            <form method="post" class="forms-sample">
              {% csrf_token %}

              <div class="form-group mb-3">
                <label for="id_nom" class="text-dark fw-semibold"><i class="mdi mdi-tag-text"></i> Nom</label>
                {{ form.nom }}
              </div>

              <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'type_proprietes' %}" class="btn btn-outline-light me-2"><i class="mdi mdi-close"></i> Annuler</a>
                <button type="submit" class="btn btn-success"><i class="mdi mdi-check"></i> {% if object %}Modifier{% else %}Ajouter{% endif %}</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
