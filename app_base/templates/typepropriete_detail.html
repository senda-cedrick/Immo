{% extends "base.html" %}
{% load static %}

{% block content %}
  <div class="content-wrapper">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-10 col-lg-8 mx-auto">
          <div class="glass-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="mb-0">
                <i class="mdi mdi-tag"></i>
                Détail du type de propriété
              </h5>
              <div>
                <a href="{% url 'modifier_type_propriete' type_propriete.id %}" class="btn btn-outline-warning btn-sm me-2"><i class="mdi mdi-pencil"></i> Modifier</a>
                <a href="{% url 'type_proprietes' %}" class="btn btn-outline-light btn-sm"><i class="mdi mdi-arrow-left"></i> Retour</a>
              </div>
            </div>

            <div class="row g-3">
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="text-muted fw-semibold"><i class="mdi mdi-tag-outline"></i> Nom</label>
                  <div class="fw-bold text-dark">{{ type_propriete.nom }}</div>
                </div>
              </div>
              <div class="col-12">
                <div class="mb-3">
                  <label class="text-muted fw-semibold"><i class="mdi mdi-text"></i> Description</label>
                  <div class="fw-bold text-dark">{{ type_propriete.description|default:"Aucune description" }}</div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="mb-3">
                  <label class="text-muted fw-semibold"><i class="mdi mdi-home-group"></i> Nombre de propriétés</label>
                  <div class="fw-bold text-dark">{{ type_propriete.proprietes.count }}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
