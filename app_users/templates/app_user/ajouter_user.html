{% extends "base.html" %}
{% load static %}

{% block content %}
  <div class="content-wrapper">
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-8 col-lg-6 mx-auto">
          <div class="glass-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h5 class="mb-0"><i class="mdi mdi-account-plus"></i> Créer un compte</h5>
              <a href="{% url 'users' %}" class="btn btn-outline-light btn-sm"><i class="mdi mdi-arrow-left"></i> Retour</a>
            </div>

            <form method="post" action="{% url 'adduser' %}" enctype="multipart/form-data">
              {% csrf_token %}
              <div class="form-group mb-3">
                <label>Utilisateur <span class="text-danger">*</span></label>
                <input name="username" type="text" class="form-control" placeholder="Entrez le nom d'utilisateur" required>
              </div>
              <div class="form-group mb-3">
                <label>Noms complets <span class="text-danger">*</span></label>
                <input name="noms" type="text" class="form-control" placeholder="Entrez votre nom complet" required>
              </div>
              <div class="form-group mb-3">
                <label>EMAIL</label>
                <input name="email" type="email" class="form-control" placeholder="Entrez votre adresse mail">
              </div>
              <div class="form-group mb-3">
                <label>PHOTO</label>
                <input name="image_url" type="file" class="form-control" accept=".jpg,.png">
              </div>
              <div class="form-group mb-3">
                <label>PROFILE <span class="text-danger">*</span></label>
                <select name="profile" class="form-control">
                  {% for p in profiles %}
                    <option value="{{p.id}}">{{p}}</option>
                  {% endfor %}
                </select>
              </div>
              <div class="form-group mb-3">
                <label>Mot de passe <span class="text-danger">*</span></label>
                <input name="password" type="password" class="form-control" value="rdc@2026" required>
                <small class="text-muted">Mot de passe par défaut : rdc@2026 (modifiable après connexion)</small>
              </div>
              <div class="d-flex justify-content-end gap-2">
                <a href="{% url 'users' %}" class="btn btn-outline-light me-2"><i class="mdi mdi-close"></i> Annuler</a>
                <button type="submit" class="btn btn-success"><i class="mdi mdi-check"></i> Ajouter</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock content %}
