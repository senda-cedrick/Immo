{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>EBAIL MANAGER</title> 
    <!-- plugins:css -->
    <link rel="stylesheet" href="{% static 'assets/vendors/mdi/css/materialdesignicons.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/vendors/css/vendor.bundle.base.css' %}">
    <!-- endinject -->
    <!-- Plugin css for this page -->
    <!-- End plugin css for this page -->
    <!-- inject:css -->
    <!-- endinject -->
    <!-- Layout styles -->
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    <!-- End layout styles -->
    <link rel="shortcut icon" href="{% static 'assets/images/favicon.png' %}" />
  </head>
  <body>
    <div class="container-scroller">
      <div class="container-fluid page-body-wrapper full-page-wrapper">
        <div class="row w-100 m-0">
          <div class="content-wrapper full-page-wrapper d-flex align-items-center auth login-bg">
            <div class="card col-lg-4 mx-auto">
              <div class="card-body px-5 py-5">
                <div class="text-center mb-4">
                  <i class="mdi mdi-home-city" style="font-size: 48px; color: #4B49AC;"></i>
                  <h3 class="card-title mt-2">EBAIL MANAGER</h3>
                  <p class="text-muted">Connectez-vous à votre compte</p>
                </div>
                <form method="post" action="{% url 'login' %}">
                   {% csrf_token %}
                  <div class="form-group">
                    <label class="control-label" for="username">
                      <i class="mdi mdi-account"></i> Nom d'utilisateur
                    </label>
                    <input type="text" class="form-control p_input" name="username" id="username" placeholder="Entrez votre nom d'utilisateur" required>
                  </div>
                  <div class="form-group">
                    <label class="control-label" for="password">
                      <i class="mdi mdi-lock"></i> Mot de passe
                    </label>
                    <input type="password" class="form-control p_input" name="password" id="password" placeholder="Entrez votre mot de passe" required>
                  </div>

                  {% if message %}
                  <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="mdi mdi-alert-circle"></i> {{message}}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                      <span aria-hidden="true">&times;</span>
                    </button>
                  </div> 
                  {% endif %}

                  <div class="text-center">
                     <button type="submit" class="btn btn-primary btn-block enter-btn">
                       <i class="mdi mdi-login"></i> Se connecter
                     </button>
                  </div>
                  
                  <div class="text-center mt-3">
                    <p class="sign-up">Vous n'avez pas de compte ? <a href="{% url 'addusers' %}">Créer un compte</a></p>
                  </div>

                </form>
              </div>
            </div>
          </div>
          <!-- content-wrapper ends -->
        </div>
        <!-- row ends -->
      </div>
      <!-- page-body-wrapper ends -->
    </div>
    <!-- container-scroller -->
    <!-- plugins:js -->
    <script src="{% static 'assets/vendors/js/vendor.bundle.base.js' %}"></script>
    <!-- endinject -->
    <!-- Plugin js for this page -->
    <!-- End plugin js for this page -->
    <!-- inject:js -->
    <script src="{% static 'assets/js/off-canvas.js' %}"></script>
    <script src="{% static 'assets/js/hoverable-collapse.js' %}"></script>
    <script src="{% static 'assets/js/misc.js'%}"></script>
    <script src="{% static 'assets/js/settings.js' %}"></script>
    <script src="{% static 'assets/js/todolist.js' %}"></script>
    <!-- endinject -->
  </body>
</html>
