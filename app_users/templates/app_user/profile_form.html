{% extends "base.html" %}

{% block content %}
<style>
    .glass-card {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.25);
        padding: 2rem;
        margin-top: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .glass-card h5, .glass-card h4 {
        color: #fff;
    }
    .form-control {
        background-color: rgba(255,255,255,0.1) !important;
        color: #fff !important;
        border: 1px solid rgba(255,255,255,0.2) !important;
    }
    .form-control::placeholder {
        color: #ccc;
    }
    label {
        color: #fff;
    }
</style>

<div class="container-fluid">
    <div class="glass-card">
        <h5 class="mb-4"><i class="mdi mdi-shield-plus"></i> {{ action }} un Profil</h5>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group mb-3">
                <label for="id_name" class="form-label">Nom du profil</label>
                {{ form.name }}
                {% if form.name.errors %}
                    <small class="text-danger">{{ form.name.errors|first }}</small>
                {% endif %}
            </div>
            <button type="submit" class="btn btn-success me-2"><i class="mdi mdi-check"></i> Enregistrer</button>
            <a href="{% url 'profile_list' %}" class="btn btn-outline-light">Annuler</a>
        </form>
    </div>
</div>
{% endblock content %}
